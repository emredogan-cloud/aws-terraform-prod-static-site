<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraform AWS S3 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cloud-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .status-badge {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .pulse {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        /* Ziyaretçi Sayacı Stili */
        .visitor-counter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .visitor-counter::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .visitor-counter-content {
            position: relative;
            z-index: 1;
        }

        .visitor-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .visitor-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .visitor-count {
            font-size: 36px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .info-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .info-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: #333;
            font-size: 18px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #764ba2;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cloud-icon">☁️</div>
        <h1>Terraform With AWS S3</h1>
        <p class="subtitle">Statik web siteniz başarıyla yayında!</p>
        
        <div class="status-badge">
            <div class="pulse"></div>
            Active and working.
        </div>

        <div class="visitor-counter">
            <div class="visitor-counter-content">
                <div class="visitor-icon">👀</div>
                <div class="visitor-label">Number Of Visitor</div>
                <div class="visitor-count" id="visitor-count">LOADING...</div>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="info-icon">🚀</div>
                <div class="info-label">Platform</div>
                <div class="info-value">AWS S3</div>
            </div>
            <div class="info-card">
                <div class="info-icon">⚡</div>
                <div class="info-label">Distribution</div>
                <div class="info-value">Terraform</div>
            </div>
            <div class="info-card">
                <div class="info-icon">🌍</div>
                <div class="info-label">State</div>
                <div class="info-value">Online</div>
            </div>
        </div>

        <div class="footer">
            <p>Created with Infrastructure as Code</p>
            <div class="links">
                <a href="#">GitHub</a>
                <a href="#">Terraform</a>
                <a href="#">AWS S3</a>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = "https://5smav4kzsufrbq7e3vv63jgh2i0qzirl.lambda-url.us-east-1.on.aws/";

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network Error");
                }
                return response.json();
            })
            .then(data => {
                // Artık id="visitor-count" olduğu için bu satır çalışacak
                document.getElementById("visitor-count").innerText = data.count;
                console.log("New meter reading: " + data.count);
            })
            .catch(error => {
                console.error("Error loading counter:", error);
                document.getElementById("visitor-count").innerText = "ERROR!";
            });
    </script>
</body>
</html>
