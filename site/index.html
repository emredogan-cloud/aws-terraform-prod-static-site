<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS S3 Static Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: #e6fffa;
            color: #047857;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px rgba(4, 120, 87, 0.15);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .info-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .info-card .icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .info-card .label {
            color: #718096;
            font-size: 13px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-card .value {
            color: #2d3748;
            font-size: 18px;
            font-weight: 600;
        }

        footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e2e8f0;
            color: #a0aec0;
            font-size: 14px;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 26px;
            }

            .subtitle {
                font-size: 16px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">☁️</div>
        
        <h1>Terraform ile AWS S3</h1>
        <p class="subtitle">Statik web siteniz başarıyla yayında!</p>
        
        <div class="status-badge">
            <span class="status-dot"></span>
            Aktif ve Çalışıyor
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="icon">🚀</div>
                <div class="label">Platform</div>
                <div class="value">AWS S3</div>
            </div>
            
            <div class="info-card">
                <div class="icon">⚡</div>
                <div class="label">Dağıtım</div>
                <div class="value">Terraform</div>
            </div>
            
            <div class="info-card">
                <div class="icon">🌍</div>
                <div class="label">Durum</div>
                <div class="value">Online</div>
            </div>
        </div>

        <footer>
            <p>Infrastructure as Code ile oluşturuldu</p>
            <p style="margin-top: 10px;">
                <a href="https://github.com" target="_blank">GitHub</a> • 
                <a href="https://terraform.io" target="_blank">Terraform</a> • 
                <a href="https://aws.amazon.com/s3" target="_blank">AWS S3</a>
            </p>
        </footer>
    </div>

    <script>
        // Basit bir animasyon için
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.info-card');
            cards.forEach((card, index) => {
                card.style.animation = `fadeIn 0.8s ease-out ${index * 0.1}s backwards`;
            });
        });
    </script>
</body>
</html>
